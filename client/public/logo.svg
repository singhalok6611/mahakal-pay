<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="Mahakal Pay">
  <title>Mahakal Pay</title>
  <defs>
    <linearGradient id="mhk-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0e2e"/>
      <stop offset="50%"  stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1b4a"/>
    </linearGradient>
  </defs>

  <!-- icon -->
  <rect x="6" y="6" width="68" height="68" rx="16" fill="url(#mhk-bg)"/>
  <rect x="6.75" y="6.75" width="66.5" height="66.5" rx="15.25"
        fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="40" y="54"
        text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="900" font-size="32" fill="#ffffff" letter-spacing="-1">MK</text>

  <!-- wordmark: MAHAKAL in gold, PAY in navy -->
  <text x="92" y="46" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="900" font-size="30" fill="#ffc107" letter-spacing="-0.5">MAHAKAL</text>
  <text x="236" y="46" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="30" fill="#1a237e" letter-spacing="-0.5">PAY</text>
  <text x="93" y="64" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="9" fill="#6b7280" letter-spacing="2.2">INSTANT RECHARGE &amp; BILL PAYMENTS</text>
</svg>

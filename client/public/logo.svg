<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" role="img" aria-label="Mahakal Pay">
  <title>Mahakal Pay</title>
  <defs>
    <linearGradient id="mhk-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcd34d"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mhk-shield-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d1b4a"/>
      <stop offset="100%" stop-color="#0a0e2e"/>
    </linearGradient>
  </defs>

  <!-- icon -->
  <path d="
    M 16 14
    C 16 10, 24 8, 40 8
    C 56 8, 64 10, 64 14
    L 64 40
    C 64 58, 54 70, 40 76
    C 26 70, 16 58, 16 40
    Z"
    fill="url(#mhk-shield-bg)"
    stroke="url(#mhk-gold)"
    stroke-width="3.5"
    stroke-linejoin="round"/>
  <path d="
    M 46 18
    L 28 40
    L 38 40
    L 32 62
    L 52 38
    L 42 38
    Z"
    fill="url(#mhk-gold)"
    stroke="#b45309"
    stroke-width="0.6"
    stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="92" y="46" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="900" font-size="30" fill="#ffc107" letter-spacing="-0.5">MAHAKAL</text>
  <text x="236" y="46" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="30" fill="#1a237e" letter-spacing="-0.5">PAY</text>
  <text x="93" y="64" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="9" fill="#6b7280" letter-spacing="2.2">INSTANT RECHARGE &amp; BILL PAYMENTS</text>
</svg>
